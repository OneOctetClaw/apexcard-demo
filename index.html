<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEXCARD — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #080b14;
    --bg2: #0d1120;
    --bg3: #111827;
    --violet: #6c63ff;
    --violet2: #8b85ff;
    --green: #43e97b;
    --gold: #f7c948;
    --red: #ff4d6d;
    --text: #f0f2f8;
    --text2: #8892a4;
    --text3: #4a5568;
    --glass: rgba(255,255,255,0.04);
    --glass2: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* Animated background */
  .bg-canvas {
    position: fixed; inset: 0;
    overflow: hidden;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 12s ease-in-out infinite;
  }
  .orb-1 { width: 600px; height: 600px; background: #6c63ff; top: -200px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #43e97b; bottom: -100px; right: 10%; animation-delay: -4s; }
  .orb-3 { width: 300px; height: 300px; background: #f7c948; top: 30%; right: -100px; animation-delay: -8s; }
  .orb-4 { width: 250px; height: 250px; background: #6c63ff; bottom: 20%; left: 15%; animation-delay: -2s; }

  @keyframes drift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* Grid overlay */
  .grid-overlay {
    position: fixed; inset: 0;
    background-image: 
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  /* Main container */
  .container {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  .hex-icon {
    width: 64px; height: 64px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .hex-icon svg { width: 64px; height: 64px; }
  .hex-inner { font-size: 24px; position: absolute; }

  .logo-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, #fff 0%, #a09fff 50%, #6c63ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-tagline {
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--text3);
    text-transform: uppercase;
  }

  /* Role selector */
  .role-cards {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
  }

  .role-card {
    width: 180px;
    padding: 20px;
    background: var(--glass);
    border: 2px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .role-card::before {
    content: '';
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 14px;
  }
  .role-card-user::before { background: radial-gradient(circle at 50% 0%, rgba(108,99,255,0.2) 0%, transparent 70%); }
  .role-card-admin::before { background: radial-gradient(circle at 50% 0%, rgba(247,201,72,0.2) 0%, transparent 70%); }
  
  .role-card:hover::before { opacity: 1; }
  .role-card:hover { transform: translateY(-3px); }
  .role-card.selected { border-color: var(--violet); background: rgba(108,99,255,0.1); }
  .role-card-admin.selected { border-color: var(--gold); background: rgba(247,201,72,0.08); }

  .role-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    font-size: 22px;
  }
  .role-card-user .role-icon { background: rgba(108,99,255,0.2); }
  .role-card-admin .role-icon { background: rgba(247,201,72,0.2); }
  
  .role-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .role-desc { font-size: 11px; color: var(--text2); }

  /* Login form */
  .login-box {
    width: 100%;
    max-width: 400px;
    background: rgba(13, 17, 32, 0.8);
    backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px;
  }

  .form-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .form-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 28px; }

  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  
  .form-input {
    width: 100%;
    padding: 13px 16px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .form-input:focus {
    border-color: var(--violet);
    background: rgba(108,99,255,0.05);
  }
  .form-input::placeholder { color: var(--text3); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #6c63ff 0%, #8b85ff 100%);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.03em;
    margin-top: 8px;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }
  .btn-login:active { transform: translateY(0); }
  .btn-login.admin { background: linear-gradient(135deg, #f7c948 0%, #ffab00 100%); color: #1a1200; }
  .btn-login.admin:hover { box-shadow: 0 8px 24px rgba(247,201,72,0.4); }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-text { display: none; }

  .sandbox-badge {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text3);
    display: flex; align-items: center; gap: 8px;
    z-index: 10;
  }
  .sandbox-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  
  .form-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<div class="grid-overlay"></div>

<div class="container">
  <!-- Logo -->
  <div class="logo-wrap">
    <div class="hex-icon">
      <svg viewBox="0 0 64 64" fill="none">
        <defs>
          <linearGradient id="hexGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#6c63ff"/>
            <stop offset="50%" stop-color="#8b85ff"/>
            <stop offset="100%" stop-color="#43e97b"/>
          </linearGradient>
        </defs>
        <path d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z" fill="url(#hexGrad)" opacity="0.9"/>
        <path d="M32 12 L50 22 L50 42 L32 52 L14 42 L14 22 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <text x="32" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="white" font-family="Space Grotesk">A</text>
      </svg>
    </div>
    <div>
      <div class="logo-name">APEXCARD</div>
      <div class="logo-tagline">Premium Financial Platform</div>
    </div>
  </div>

  <!-- Role cards -->
  <div class="role-cards">
    <div class="role-card role-card-user selected" id="card-user" onclick="selectRole('user')">
      <div class="role-icon">💳</div>
      <div class="role-title">Espace Client</div>
      <div class="role-desc">Gérez vos cartes & crypto</div>
    </div>
    <div class="role-card role-card-admin" id="card-admin" onclick="selectRole('admin')">
      <div class="role-icon">⚙️</div>
      <div class="role-title">Espace Admin</div>
      <div class="role-desc">Gestion de la plateforme</div>
    </div>
  </div>

  <!-- Login form -->
  <div class="login-box">
    <div class="form-title" id="form-title">Connexion Client</div>
    <div class="form-subtitle" id="form-subtitle">Accédez à votre espace personnel</div>
    
    <div class="form-group">
      <label class="form-label">Adresse email</label>
      <input type="email" class="form-input" id="email-input" placeholder="vous@exemple.com" value="jp@apexcard.io">
    </div>
    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input type="password" class="form-input" id="pass-input" placeholder="••••••••••" value="••••••••">
    </div>
    
    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span class="btn-text" id="btn-text">Connexion</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="form-hint">Sandbox mode — tous les identifiants sont acceptés</div>
  </div>
</div>

<!-- Sandbox badge -->
<div class="sandbox-badge">
  <div class="sandbox-dot"></div>
  SANDBOX MODE — DONNÉES FICTIVES
</div>

<script>
let selectedRole = 'user';

function selectRole(role) {
  selectedRole = role;
  document.getElementById('card-user').classList.toggle('selected', role === 'user');
  document.getElementById('card-admin').classList.toggle('selected', role === 'admin');
  
  const btn = document.getElementById('login-btn');
  const title = document.getElementById('form-title');
  const subtitle = document.getElementById('form-subtitle');
  const btnText = document.getElementById('btn-text');
  
  if (role === 'admin') {
    btn.classList.add('admin');
    title.textContent = 'Connexion Admin';
    subtitle.textContent = 'Accédez au panneau de contrôle';
    btnText.textContent = 'Accès Admin';
  } else {
    btn.classList.remove('admin');
    title.textContent = 'Connexion Client';
    subtitle.textContent = 'Accédez à votre espace personnel';
    btnText.textContent = 'Connexion';
  }
}

function doLogin() {
  const btn = document.getElementById('login-btn');
  btn.classList.add('loading');
  
  setTimeout(() => {
    if (selectedRole === 'admin') {
      window.location.href = 'app-admin.html';
    } else {
      window.location.href = 'app-user.html';
    }
  }, 1200);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
