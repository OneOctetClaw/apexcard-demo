<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page.title.login">APEXCARD — Connexion</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src fonts.gstatic.com; img-src 'self' data: blob:; frame-ancestors 'none';">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #030308;
    --violet: #7C3AED;
    --cyan: #06B6D4;
    --gold: #F59E0B;
    --green: #10B981;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #F1F5F9;
    --muted: rgba(241,245,249,0.5);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* Orbs */
  .orbs {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.55;
    animation: orbDrift 20s infinite ease-in-out alternate;
  }
  .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #7C3AED, transparent 70%); top: -200px; left: -150px; animation-duration: 18s; }
  .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #06B6D4, transparent 70%); top: 20%; right: -100px; animation-duration: 22s; animation-delay: -6s; }
  .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, #4F46E5, transparent 70%); bottom: -100px; left: 30%; animation-duration: 25s; animation-delay: -10s; }
  .orb-4 { width: 350px; height: 350px; background: radial-gradient(circle, #10B981, transparent 70%); bottom: 10%; left: -50px; animation-duration: 30s; animation-delay: -4s; opacity: 0.35; }
  .orb-5 { width: 300px; height: 300px; background: radial-gradient(circle, #F59E0B, transparent 70%); top: 40%; left: 50%; animation-duration: 28s; animation-delay: -14s; opacity: 0.25; }
  .orb-6 { width: 450px; height: 450px; background: radial-gradient(circle, #7C3AED80, transparent 70%); bottom: -150px; right: -100px; animation-duration: 20s; animation-delay: -8s; }

  @keyframes orbDrift {
    0% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(60px, -40px) scale(1.08); }
    66% { transform: translate(-40px, 60px) scale(0.95); }
    100% { transform: translate(30px, 20px) scale(1.03); }
  }

  /* Grid */
  .grid-bg {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(800px) rotateX(10deg);
    transform-origin: 50% 0%;
    mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.4) 30%, rgba(0,0,0,0.4) 70%, transparent 100%);
  }

  /* Noise */
  .noise {
    position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
  }

  /* Canvas particles */
  canvas#particles {
    position: fixed; inset: 0; z-index: 3; pointer-events: none;
  }

  /* Main layout */
  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    overflow-y: auto;
  }

  /* Logo */
  .logo-wrap {
    text-align: center; margin-bottom: 2.5rem;
    animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #7C3AED, #06B6D4);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 800;
    box-shadow: 0 0 40px rgba(124,58,237,0.5), 0 0 80px rgba(6,182,212,0.2);
    margin-bottom: 1rem;
    animation: logoPulse 4s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(124,58,237,0.5), 0 0 80px rgba(6,182,212,0.2); }
    50% { box-shadow: 0 0 60px rgba(124,58,237,0.8), 0 0 120px rgba(6,182,212,0.35); }
  }
  .logo-name {
    font-size: 2rem; font-weight: 800; letter-spacing: 0.12em;
    background: linear-gradient(90deg, #fff 0%, #a78bfa 50%, #67e8f9 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo-tagline {
    font-size: 0.9rem; font-weight: 400; letter-spacing: 0.08em;
    color: var(--muted); margin-top: 0.3rem;
  }
  .logo-tagline span {
    background: linear-gradient(90deg, #7C3AED, #06B6D4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    font-weight: 600;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Login card */
  .login-card {
    width: 100%; max-width: 440px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 24px;
    padding: 2.5rem;
    position: relative;
    animation: fadeUp 0.8s 0.2s cubic-bezier(.22,1,.36,1) both;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.07), 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  /* Aurora border */
  .login-card::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: 25px;
    background: linear-gradient(90deg, #7C3AED, #06B6D4, #10B981, #7C3AED);
    background-size: 300% 100%;
    animation: auroraShift 6s linear infinite;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    padding: 1px;
    z-index: -1;
  }

  @keyframes auroraShift {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .section-label {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 1rem;
  }

  /* Role selector */
  .role-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 2rem;
  }
  .role-card {
    padding: 1.1rem 1rem;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    text-align: center;
    transform-style: preserve-3d;
  }
  .role-card:hover {
    border-color: rgba(124,58,237,0.5);
    background: rgba(124,58,237,0.08);
    transform: perspective(600px) translateZ(8px);
    box-shadow: 0 0 20px rgba(124,58,237,0.2);
  }
  .role-card.active {
    border-color: rgba(124,58,237,0.7);
    background: rgba(124,58,237,0.12);
    box-shadow: 0 0 24px rgba(124,58,237,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .role-card.active::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.1), transparent);
  }
  .role-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
  .role-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
  .role-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

  /* Inputs */
  .input-group { margin-bottom: 1.25rem; }
  .input-label { font-size: 0.78rem; font-weight: 500; color: var(--muted); margin-bottom: 0.5rem; display: block; }
  .input-wrap { position: relative; }
  .input-wrap .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 1rem; opacity: 0.5; pointer-events: none;
  }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem 0.85rem 2.8rem;
    font-family: inherit; font-size: 0.95rem; color: var(--text);
    outline: none; transition: all 0.3s;
  }
  input:focus {
    border-color: rgba(124,58,237,0.6);
    background: rgba(124,58,237,0.05);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.15), 0 0 20px rgba(124,58,237,0.1);
  }
  input::placeholder { color: rgba(241,245,249,0.3); }

  /* CTA Button */
  .btn-cta {
    width: 100%; padding: 1rem; border: none; border-radius: 14px;
    font-family: inherit; font-size: 1rem; font-weight: 700; letter-spacing: 0.04em;
    color: #fff; cursor: pointer;
    background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 50%, #4338CA 100%);
    position: relative; overflow: hidden;
    transition: all 0.3s; margin-top: 0.5rem;
    box-shadow: 0 4px 24px rgba(124,58,237,0.4);
  }
  .btn-cta::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    animation: shimmer 3s infinite;
  }
  .btn-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(124,58,237,0.6);
  }
  .btn-cta:active { transform: translateY(0); }
  .btn-cta:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    60%, 100% { transform: translateX(100%); }
  }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0;
    font-size: 0.78rem; color: var(--muted);
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Quick access */
  .quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .quick-btn {
    padding: 0.75rem; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; font-family: inherit;
    font-size: 0.8rem; font-weight: 600; color: var(--muted);
    transition: all 0.25s; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .quick-btn:hover {
    border-color: rgba(6,182,212,0.4);
    color: #06B6D4;
    background: rgba(6,182,212,0.06);
  }

  /* Timeout notice */
  .timeout-notice {
    margin-top: 1rem;
    padding: 0.6rem 1rem;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    font-size: 0.78rem;
    color: rgba(245,158,11,0.8);
    text-align: center;
    display: none;
  }

  /* Error message */
  .error-msg {
    color: #EF4444; text-align: center; margin-top: 12px; font-size: 0.88rem;
    padding: 0.5rem 0;
  }

  /* Lockout message */
  .lockout-msg {
    color: #F59E0B; text-align: center; margin-top: 12px; font-size: 0.88rem;
    padding: 0.6rem; background: rgba(245,158,11,0.08); border-radius: 8px;
    border: 1px solid rgba(245,158,11,0.2); display: none;
  }

  @media (max-width: 480px) {
    .page { padding: 1rem; }
    .login-card { padding: 1.75rem 1.25rem; }
    .logo-name { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
  <div class="orb orb-6"></div>
</div>
<div class="grid-bg"></div>
<div class="noise"></div>
<canvas id="particles"></canvas>

<div class="page">
  <!-- Lang switcher top right -->
  <div style="position:fixed;top:1.2rem;right:1.5rem;z-index:100">
    <div class="lang-switcher">
      <button onclick="i18n.setLang('fr')" data-lang="fr" class="lang-btn">🇫🇷 FR</button>
      <button onclick="i18n.setLang('en')" data-lang="en" class="lang-btn">🇬🇧 EN</button>
    </div>
  </div>

  <div class="logo-wrap">
    <div class="logo-icon">⬡</div>
    <div class="logo-name">APEXCARD</div>
    <div class="logo-tagline"><span data-i18n="login.tagline">Banking without borders</span></div>
  </div>

  <div class="login-card">
    <div class="section-label" data-i18n="login.role.label">Choisissez votre rôle</div>
    <div class="role-grid">
      <div class="role-card active" onclick="selectRole('user', this)">
        <div class="role-icon">👤</div>
        <div class="role-name" data-i18n="login.role.client">Client</div>
        <div class="role-desc" data-i18n="login.role.client.desc">Compte personnel</div>
      </div>
      <div class="role-card" onclick="selectRole('admin', this)">
        <div class="role-icon">🛡️</div>
        <div class="role-name" data-i18n="login.role.admin">Admin</div>
        <div class="role-desc" data-i18n="login.role.admin.desc">Panneau de gestion</div>
      </div>
    </div>

    <div class="input-group">
      <label class="input-label" for="email" data-i18n="login.email.label">Adresse email</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" data-i18n-placeholder="login.email.placeholder" placeholder="vous@apexcard.io" autocomplete="email">
      </div>
    </div>

    <div class="input-group">
      <label class="input-label" for="password" data-i18n="login.pwd.label">Mot de passe</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <div id="lockout-msg" class="lockout-msg"></div>
    <div id="login-error" class="error-msg" style="display:none"></div>

    <button class="btn-cta" id="login-btn" onclick="doLogin()" data-i18n="login.btn">Se connecter à APEXCARD</button>

    <div class="divider" data-i18n="login.divider">ou accès rapide</div>

    <div class="quick-grid">
      <button class="quick-btn" onclick="quickLogin('user')" data-i18n="login.demo_client">⚡ Démo Client</button>
      <button class="quick-btn" onclick="quickLogin('admin')" data-i18n="login.demo_admin">⚡ Démo Admin</button>
    </div>

    <div id="timeout-notice" class="timeout-notice" data-i18n="login.timeout">
      🔒 Votre session a expiré en raison d'inactivité. Veuillez vous reconnecter.
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script>document.addEventListener('DOMContentLoaded', i18n.initLang)</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
// =========================================
// SECURITY: Rate limiting (OWASP A04, PCI DSS Req 8)
// Max 5 attempts per email per 15 minutes
// =========================================
const MAX_ATTEMPTS = 5;
const LOCKOUT_DURATION = 15 * 60 * 1000; // 15 min

function checkRateLimit(email) {
  const key = 'rl_' + btoa(email).replace(/[^a-zA-Z0-9]/g, '');
  let data;
  try {
    data = JSON.parse(localStorage.getItem(key) || '{"count":0,"resetAt":0}');
  } catch(e) {
    data = { count: 0, resetAt: 0 };
  }
  // If lockout expired, reset
  if (Date.now() > data.resetAt) {
    data = { count: 0, resetAt: Date.now() + LOCKOUT_DURATION };
  }
  // Check if currently locked out
  if (data.count >= MAX_ATTEMPTS) {
    const remaining = Math.ceil((data.resetAt - Date.now()) / 60000);
    return { blocked: true, remaining };
  }
  data.count++;
  localStorage.setItem(key, JSON.stringify(data));
  return { blocked: false };
}

function clearRateLimit(email) {
  const key = 'rl_' + btoa(email).replace(/[^a-zA-Z0-9]/g, '');
  localStorage.removeItem(key);
}

// =========================================
// SUPABASE — Anon key only (never service role in browser)
// =========================================
const { createClient } = supabase;
const sb = createClient(
  'https://vhdgqtwsxasuggbeujoo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoZGdxdHdzeGFzdWdnYmV1am9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODU2MzIsImV4cCI6MjA4OTk2MTYzMn0.J_9V--cflujeSnOsc_3wYDOgiMi54RTF5aDHC4fMZVI'
);

let currentRole = 'user';

// Show session timeout notice if redirected with reason=timeout
(function checkTimeoutReason() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('reason') === 'timeout') {
    const notice = document.getElementById('timeout-notice');
    if (notice) notice.style.display = 'block';
    // Clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
  }
})();

function selectRole(role, el) {
  currentRole = role;
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  // Don't pre-fill credentials — security: no hardcoded values
}

function showError(msg) {
  const errDiv = document.getElementById('login-error');
  errDiv.textContent = msg;
  errDiv.style.display = 'block';
}

function hideError() {
  const errDiv = document.getElementById('login-error');
  errDiv.style.display = 'none';
}

function showLockout(remaining) {
  const lockDiv = document.getElementById('lockout-msg');
  lockDiv.textContent = t('login.lockout').replace('{n}', remaining).replace('{s}', remaining > 1 ? 's' : '');
  lockDiv.style.display = 'block';
  document.getElementById('login-btn').disabled = true;
  setTimeout(() => {
    lockDiv.style.display = 'none';
    document.getElementById('login-btn').disabled = false;
  }, remaining * 60 * 1000);
}

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  hideError();

  if (!email || !password) {
    showError(t('login.error.empty'));
    return;
  }

  // Rate limit check
  const rl = checkRateLimit(email);
  if (rl.blocked) {
    showLockout(rl.remaining);
    return;
  }

  btn.textContent = t('login.authenticating');
  btn.disabled = true;

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      // Log failed attempt (without exposing error details to UI)
      try {
        await sb.from('login_attempts').insert({ email, success: false });
      } catch(_) {}
      // SECURITY: Generic error message — never reveal if email exists or password is wrong
      showError(t('login.error.credentials'));
      btn.textContent = t('login.btn');
      btn.disabled = false;
      return;
    }

    // Clear rate limit on success
    clearRateLimit(email);

    // Log successful login
    try {
      await sb.from('login_attempts').insert({ email, success: true });
      await sb.from('audit_logs').insert({
        user_id: data.user.id,
        action: 'login',
        metadata: { role: currentRole }
      });
    } catch(_) {}

    // Redirect based on role
    if (currentRole === 'admin') {
      window.location.href = 'app-admin.html';
    } else {
      window.location.href = 'app-user.html';
    }
  } catch (e) {
    // SECURITY: Never expose technical errors to user
    showError(t('login.error.generic'));
    btn.textContent = t('login.btn');
    btn.disabled = false;
  }
}

// Quick login for demo — pre-fills email but not password for security
async function quickLogin(role) {
  currentRole = role;
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.role-card')[role === 'admin' ? 1 : 0]?.classList.add('active');
  document.getElementById('email').value = 'jp@apexcard.io';
  document.getElementById('password').focus();
  // Note: password must be entered manually — never hardcoded
}

// Allow Enter key to submit
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

// Particles
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.3,
    dy: (Math.random() - 0.5) * 0.3,
    opacity: Math.random() * 0.6 + 0.1,
  };
}

function initParticles() {
  particles = [];
  const n = Math.floor(canvas.width * canvas.height / 12000);
  for (let i = 0; i < n; i++) particles.push(createParticle());
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(167, 139, 250, ${p.opacity})`;
    ctx.fill();
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });
  requestAnimationFrame(drawParticles);
}

window.addEventListener('resize', () => { resize(); initParticles(); });
resize(); initParticles(); drawParticles();
</script>
